# Production profile — set secrets via environment variables (never commit real values)

# Render and other PaaS set PORT; local Docker uses 8080
server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/networkdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update

app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

# Comma-separated origins, e.g. https://your-app.com,https://www.your-app.com
app.cors.allowed-origin-patterns=${APP_CORS_ORIGINS:}
